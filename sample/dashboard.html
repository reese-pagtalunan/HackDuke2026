<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiFive 🤚 — Dashboard</title>
  <meta name="description" content="Your HiFive dashboard — find people nearby and send HiFives." />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --blue: #1A56FF;
      --blue-light: #E8EFFF;
      --blue-soft: #F4F7FF;
      --blue-mid: #B8CCFF;
      --blue-accent: #4D7BFF;
      --navy: #1C1F6E;
      --text: #1A1F36;
      --text-muted: #6B7394;
      --white: #FFFFFF;
      --bg: #FAFBFF;
      --separator: rgba(26, 86, 255, 0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 0 60px rgba(26, 86, 255, 0.08);
    }

    /* ─── STATUS BAR ────────────────────────── */
    .status-bar {
      background: var(--white);
      padding: 12px 24px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
    }
    .status-icons { display: flex; gap: 6px; align-items: center; font-size: 0.7rem; }

    /* ─── HEADER ────────────────────────────── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--separator);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-back {
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .header-back:hover { color: var(--blue); }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header-search-input {
      flex: 1; padding: 10px 16px; border-radius: 100px;
      border: 1px solid var(--separator); background: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .header-search-input:focus { border-color: var(--blue-mid); }
    .search-hidden { display: none !important; }

    /* ─── TABS ──────────────────────────────── */
    .tabs {
      background: var(--white);
      display: flex;
      border-bottom: 1px solid var(--separator);
      padding: 0 20px;
      gap: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab.active {
      color: var(--navy);
      font-weight: 700;
      border-bottom-color: var(--navy);
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* ─── ALPHABET SIDEBAR ──────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }
    .people-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 100px;
    }
    .alpha-bar {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
      gap: 1px;
    }
    .alpha-char {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.6;
      transition: color 0.15s;
      user-select: none;
    }
    .alpha-char:hover { color: var(--blue); }

    /* ─── SECTION HEADER ────────────────────── */
    .section-letter {
      padding: 10px 20px 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      background: var(--bg);
      border-bottom: 1px solid var(--separator);
    }

    /* ─── PERSON ROW ────────────────────────── */
    .person-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      background: var(--white);
      border-bottom: 1px solid var(--separator);
      transition: background 0.15s;
    }
    .person-row:hover { background: var(--blue-soft); }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--blue-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      color: var(--white);
      font-weight: 700;
      position: relative; /* Added for status dot */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      border: 2px solid transparent;
    }

    .unread-badge {
      background: #FF3B30;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 12px;
      min-width: 18px;
      text-align: center;
      line-height: 1.2;
    }

    .status-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }
    .status-online { background: #00C853; }
    .status-offline { background: #9E9E9E; }

    /* Custom Confirmation Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.visible { display: flex; animation: modal-fade-in 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes modal-fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-card {
      background: var(--bg);
      border: 1px solid var(--separator);
      border-radius: 28px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .modal-icon { font-size: 3.5rem; margin-bottom: 20px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; color: var(--text); }
    .modal-message { color: var(--text-muted); line-height: 1.6; margin-bottom: 32px; font-size: 0.95rem; }
    .modal-actions { display: flex; gap: 12px; }
    .modal-btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .modal-btn.cancel { background: var(--bg); border: 1.5px solid var(--separator); color: var(--text); }
    .modal-btn.confirm { background: #FF3B30; border: 1.5px solid #FF3B30; color: #fff; }
    .modal-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .modal-btn:active { transform: translateY(-1px); }
    .avatar.selected {
      background: var(--navy);
      color: var(--white);
    }
    .avatar-check {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--navy);
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    .avatar.selected .avatar-check { display: flex; }
    .avatar.selected .avatar-initials { display: none; }

    .person-name {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
    }

    .add-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .add-btn:hover { background: var(--blue-light); color: var(--blue); }

    /* ─── FLOATING SEND BUTTON ──────────────── */
    .send-bar {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 20;
      width: calc(100% - 80px);
      max-width: 400px;
    }
    .send-bar.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: all;
    }
    .send-btn {
      width: 100%;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 100px;
      padding: 16px 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(28, 31, 110, 0.35);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .send-btn:hover { background: var(--blue); box-shadow: 0 12px 36px rgba(26, 86, 255, 0.35); }
    .send-count {
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.85rem;
    }

    /* ─── BOTTOM NAV ────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 14px 0 20px;
      z-index: 30;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-item.active { opacity: 1; }
    .nav-item svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-label { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.5px; color: rgba(255,255,255,0.8); }

    /* ─── EMPTY STATE ───────────────────────── */
    .empty-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-tab-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-tab-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .empty-tab-sub { font-size: 0.85rem; line-height: 1.6; }
    /* ─── CHAT PANE ─────────────────────────── */
    .chat-pane {
      position: fixed; top: 100%; left: 0; right: 0; bottom: 0;
      background: var(--bg); z-index: 50; display: flex; flex-direction: column;
      transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 480px; margin: 0 auto;
    }
    .chat-pane.open { top: 0; }
    .chat-header {
      background: var(--white); padding: 14px 20px; display: flex; align-items: center;
      gap: 12px; border-bottom: 1px solid var(--separator);
    }
    .chat-back { font-size: 1.4rem; color: var(--text-muted); cursor: pointer; padding: 4px; user-select: none; }
    .chat-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--text); flex: 1; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
    }
    .chat-input-area {
      background: var(--white); padding: 14px 20px; border-top: 1px solid var(--separator);
      display: flex; gap: 12px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 14px 18px; border-radius: 100px; border: 1px solid rgba(26, 86, 255, 0.15);
      background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none;
    }
    .chat-send {
      background: var(--blue); color: var(--white); border: none; width: 46px; height: 46px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { background: var(--blue-mid); cursor: not-allowed; }
    .msg-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
    .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }
    .msg-bubble {
      padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4;
    }
    .msg-wrap.mine .msg-bubble {
      background: var(--blue); color: var(--white); border-bottom-right-radius: 4px;
    }
    .msg-wrap.theirs .msg-bubble {
      background: var(--white); color: var(--text); border: 1px solid rgba(26, 86, 255, 0.1); border-bottom-left-radius: 4px;
    }
    .msg-sender { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
    
    .icebreaker-card {
      background: linear-gradient(135deg, var(--blue-light), var(--blue-soft));
      border: 1px solid var(--blue-mid); border-radius: 20px; padding: 24px; text-align: center;
      margin-bottom: 24px; animation: fade-in 0.4s ease;
    }
    .icebreaker-icon { font-size: 2rem; margin-bottom: 12px; }
    .icebreaker-q { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--navy); font-size: 1.05rem; margin-bottom: 20px; line-height: 1.4; }
    .icebreaker-ib { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--blue-mid); margin-bottom: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline:none; }
    .icebreaker-btn { width: 100%; background: var(--blue); color: var(--white); font-family: 'Syne', sans-serif; font-weight: 700; padding: 14px; border-radius: 100px; border: none; cursor: pointer; }
    
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── PROFILE SETUP OVERLAY ─────────────── */
    .profile-setup-overlay {
      position: fixed; inset: 0; background: var(--white); z-index: 100;
      display: none; flex-direction: column; padding: 40px 32px;
      overflow-y: auto;
    }
    .profile-setup-overlay.visible { display: flex; }
    .setup-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .setup-sub { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5; }
    .setup-label { font-weight: 700; font-size: 0.85rem; color: var(--text); margin-bottom: 8px; display: block; }
    .setup-input {
      width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--separator);
      background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 1rem; margin-bottom: 20px; outline: none;
    }
    .setup-input:focus { border-color: var(--blue-mid); }
    .setup-btn {
      background: var(--blue); color: var(--white); border: none; padding: 18px;
      border-radius: 100px; font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1rem; cursor: pointer; margin-top: 12px; box-shadow: 0 8px 24px rgba(26, 86, 255, 0.25);
    }

    /* ─── PROFILE TAB ───────────────────────── */
    .profile-container { padding: 24px; }
    .profile-card {
      background: var(--white); border-radius: 20px; padding: 24px;
      border: 1px solid var(--separator); box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      margin-bottom: 24px;
    }
    .profile-avatar-large {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-light), var(--blue-mid));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem;
      color: var(--blue); margin: 0 auto 16px;
    }
    .profile-username { text-align: center; font-weight: 700; font-size: 1.1rem; color: var(--navy); margin-bottom: 24px; }
    .profile-edit-group { margin-bottom: 16px; }
    .profile-save-btn {
      width: 100%; padding: 14px; border-radius: 100px;
      background: var(--navy); color: var(--white); border: none;
      font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
    }

    /* ─── TOAST NOTIFICATIONS ───────────────── */
    #toast-container {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 10px; z-index: 1000;
      pointer-events: none; width: calc(100% - 40px); max-width: 400px;
    }
    .toast {
      background: rgba(28, 31, 110, 0.9); backdrop-filter: blur(8px);
      color: white; padding: 12px 20px; border-radius: 100px;
      font-size: 0.88rem; font-weight: 600; text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      animation: toast-in-out 3s ease forwards;
      pointer-events: auto; border: 1px solid rgba(255,255,255,0.1);
    }
    @keyframes toast-in-out {
      0% { opacity: 0; transform: translateY(20px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }

    #profile-success-msg {
      color: #00C853; font-weight: 700; font-size: 0.85rem;
      text-align: center; margin-top: 12px; display: none;
      animation: fade-in 0.3s ease;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header style="gap: 12px;">
    <a href="/" class="header-back">← Home</a>
    <input type="text" id="live-search" class="header-search-input search-hidden" placeholder="Search accounts..." autocomplete="off" />
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tab-friends" onclick="switchTab('friends')">Friends</div>
    <div class="tab" id="tab-requests" onclick="switchTab('requests')">Requests</div>
    <div class="tab" id="tab-search" onclick="switchTab('search')">Search</div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area">
    <div class="people-list" id="people-list">
      <!-- Populated by JS -->
    </div>

    <!-- Alphabetical sidebar -->
    <div class="alpha-bar" id="alpha-bar"></div>
  </div>

  <!-- FLOATING SEND BAR -->
  <div class="send-bar" id="send-bar">
    <button class="send-btn" id="send-btn" onclick="sendInvites()">
      Send HiFives <span class="send-count" id="send-count">0</span>
    </button>
  </div>

  <!-- CHAT PANE -->
  <div class="chat-pane" id="chat-pane">
    <div class="chat-header">
      <div class="chat-back" onclick="closeChat()">&#8592;</div>
      <div class="chat-title" id="chat-title">Chat</div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <!-- Messages inject here -->
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." disabled />
      <button class="chat-send" id="chat-send" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location='/'">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="nav-label">Friends</span>
    </div>
    <div class="nav-item" onclick="switchTab('search')" id="nav-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <span class="nav-label">Search</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><polygon points="3,11 22,2 13,21 11,13 3,11"/></svg>
      <span class="nav-label">Nearby</span>
    </div>
    <div class="nav-item" onclick="switchTab('profile')" id="nav-profile">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label">Profile</span>
    </div>
  </nav>

  <div id="toast-container"></div>

  <!-- PROFILE SETUP OVERLAY -->
  <div class="profile-setup-overlay" id="profile-setup-overlay">
    <div class="setup-title">Welcome to HiFive! 🤚</div>
    <div class="setup-sub">Let's set up your profile so friends can find you.</div>
    
    <label class="setup-label">FIRST NAME</label>
    <input type="text" id="setup-firstname" class="setup-input" placeholder="e.g. Alex" />
    
    <label class="setup-label">LAST NAME</label>
    <input type="text" id="setup-lastname" class="setup-input" placeholder="e.g. Smith" />
    
    <label class="setup-label">YOUR HOBBIES</label>
    <input type="text" id="setup-hobbies" class="setup-input" placeholder="e.g. Surfing, Coding, Music..." />
    
    <button class="setup-btn" onclick="saveInitialProfile()">Start High-Fiving!</button>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const token = localStorage.getItem('chatToken');
    const myUsername = localStorage.getItem('chatUsername');

    if (!token || !myUsername) {
      window.location.href = '/';
    }

    let people = [];
    let friendsData = { friends: [], pendingSent: [], pendingReceived: [] };
    const selected = new Set();
    let currentTab = 'friends';

    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const activeTab = document.getElementById(`tab-${tab}`);
      if (activeTab) activeTab.classList.add('active');
      
      // Update bottom nav active state
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const activeNav = document.getElementById(`nav-${tab}`) || (tab === 'friends' ? document.querySelector('.bottom-nav .nav-item:nth-child(2)') : null);
      if (activeNav) activeNav.classList.add('active');

      const searchInput = document.getElementById('live-search');
      if (tab === 'search') {
        searchInput.classList.remove('search-hidden');
        searchInput.focus();
      } else {
        searchInput.classList.add('search-hidden');
      }

      const listArea = document.getElementById('people-list');
      listArea.innerHTML = '';
      const alphaBar = document.getElementById('alpha-bar');
      if (alphaBar) alphaBar.innerHTML = '';

      if (tab === 'friends' || tab === 'requests' || tab === 'search') {
        renderInviteList();
      } else if (tab === 'profile') {
        renderProfileTab();
      }
    }

    function updateSendBar() {
      const bar = document.getElementById('send-bar');
      const count = document.getElementById('send-count');
      count.textContent = selected.size;
      if (selected.size > 0) {
        bar.classList.add('visible');
        const btn = document.getElementById('send-btn');
        btn.childNodes[0].textContent = 'Send HiFives ';
      } else {
        bar.classList.remove('visible');
      }
    }

    function renderInviteList() {
      const list = document.getElementById('people-list');
      list.innerHTML = '';
      
      let renderList = [];
      if (currentTab === 'friends') {
          renderList = (friendsData?.friends || []).map(u => ({ id: u.id, name: u.username || u.name, isOnline: u.isOnline, unreadCount: u.unreadCount || 0 }));
      } else if (currentTab === 'requests') {
          renderList = (friendsData?.pendingReceived || []).map(r => ({ id: r.user.id, name: r.user.username || r.user.name, requestId: r.requestId, isOnline: r.user.isOnline }));
      } else if (currentTab === 'search') {
          renderList = people;
      }

      const groups = groupByLetter(renderList);
      const letters = Object.keys(groups).sort();

      letters.forEach(letter => {
        // Section header
        const header = document.createElement('div');
        header.className = 'section-letter';
        header.id = 'section-' + letter;
        header.textContent = letter;
        list.appendChild(header);

        groups[letter].forEach(person => {
          try {
            const row = document.createElement('div');
            row.className = 'person-row';

            const avatar = document.createElement('div');
            avatar.className = 'avatar' + (selected.has(person.name) ? ' selected' : '');
            avatar.innerHTML = `
              <span class="avatar-initials">${getInitials(person.name)}</span>
              <div class="status-dot ${person.isOnline ? 'status-online' : 'status-offline'}"></div>
              <span class="avatar-check">✓</span>
            `;
            avatar.addEventListener('click', () => toggleSelect(person.name, avatar, row));

            const nameEl = document.createElement('div');
            nameEl.className = 'person-name';
            nameEl.textContent = person.name;

            if (person.unreadCount > 0) {
              const badge = document.createElement('span');
              badge.className = 'unread-badge';
              badge.textContent = person.unreadCount;
              nameEl.appendChild(badge);
            }

            const btn = document.createElement('button');
            btn.className = 'add-btn';
            
            if (currentTab === 'friends') {
                // Chat button
                btn.innerHTML = '💬';
                btn.title = 'Chat with ' + person.name;
                btn.style.marginRight = '6px';
                btn.addEventListener('click', () => openChat(person));

                // Unfriend button
                const unfriendBtn = document.createElement('button');
                unfriendBtn.className = 'add-btn';
                unfriendBtn.innerHTML = '🚫';
                unfriendBtn.title = 'Unfriend ' + person.name;
                unfriendBtn.style.background = '#FF3B30';
                unfriendBtn.style.borderColor = '#FF3B30';
                unfriendBtn.style.color = 'var(--white)';
                unfriendBtn.addEventListener('click', () => unfriend(person.id));

                row.appendChild(avatar);
                row.appendChild(nameEl);
                row.appendChild(btn);
                row.appendChild(unfriendBtn);
                list.appendChild(row);
                return; // skip default append below
            } else if (currentTab === 'requests') {
                // Accept button
                const acceptBtn = document.createElement('button');
                acceptBtn.className = 'add-btn';
                acceptBtn.innerHTML = '✓';
                acceptBtn.title = 'Accept Request';
                acceptBtn.style.background = '#00C853';
                acceptBtn.style.borderColor = '#00C853';
                acceptBtn.style.color = 'var(--white)';
                acceptBtn.style.marginRight = '6px';
                acceptBtn.addEventListener('click', () => acceptFriendRequest(person.requestId, person));

                // Deny button
                const denyBtn = document.createElement('button');
                denyBtn.className = 'add-btn';
                denyBtn.innerHTML = '✕';
                denyBtn.title = 'Decline Request';
                denyBtn.style.background = '#FF3B30';
                denyBtn.style.borderColor = '#FF3B30';
                denyBtn.style.color = 'var(--white)';
                denyBtn.addEventListener('click', () => declineFriendRequest(person.requestId));

                row.appendChild(avatar);
                row.appendChild(nameEl);
                row.appendChild(acceptBtn);
                row.appendChild(denyBtn);
                list.appendChild(row);
                return; // skip default append below
            } else if (currentTab === 'search') {
                const isFriend = friendsData?.friends?.find(f => f?.id === person.id);
                const sentReq = friendsData?.pendingSent?.find(f => f?.user?.id === person.id);
                const rcvReq = friendsData?.pendingReceived?.find(f => f?.user?.id === person.id);

                if (isFriend) {
                  btn.innerHTML = '💬';
                  btn.title = 'Chat with ' + person.name;
                  btn.addEventListener('click', () => openChat(person));
                } else if (sentReq) {
                  btn.innerHTML = '⏳';
                  btn.title = 'Request Sent';
                  btn.style.background = 'var(--text-muted)';
                  btn.style.borderColor = 'var(--text-muted)';
                  btn.style.color = 'var(--white)';
                  btn.disabled = true;
                } else if (rcvReq) {
                  btn.innerHTML = '✓';
                  btn.title = 'Accept Request';
                  btn.style.background = '#00C853';
                  btn.style.borderColor = '#00C853';
                  btn.style.color = 'var(--white)';
                  btn.addEventListener('click', () => acceptFriendRequest(rcvReq.requestId, person));
                } else {
                  btn.innerHTML = '+';
                  btn.title = 'Add Friend';
                  btn.addEventListener('click', () => sendFriendRequest(person.id));
                }
            }

            row.appendChild(avatar);
            row.appendChild(nameEl);
            row.appendChild(btn);
            list.appendChild(row);
          } catch(err) {
            console.error(err);
          }
        });
      });

      // Build alpha sidebar
      const alphaBar = document.getElementById('alpha-bar');
      if (alphaBar) {
        alphaBar.innerHTML = '';
        letters.forEach(letter => {
          const span = document.createElement('span');
          span.className = 'alpha-char';
          span.textContent = letter;
          span.addEventListener('click', () => {
            const section = document.getElementById('section-' + letter);
            if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          alphaBar.appendChild(span);
        });
      }
    }

    async function fetchFriends() {
      try {
        const res = await fetch(`${API_BASE}/api/friends`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          friendsData = await res.json();
          renderInviteList();
        }
      } catch(err) { console.error('Error fetching friends:', err); }
    }

    async function sendFriendRequest(targetId) {
      document.body.style.cursor = 'wait';
      await fetch(`${API_BASE}/api/friends/request`, {
         method: 'POST',
         headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
         body: JSON.stringify({ targetUserId: targetId })
      });
      document.body.style.cursor = 'default';
      fetchFriends();
    }

    async function acceptFriendRequest(requestId, personObj) {
       document.body.style.cursor = 'wait';
       await fetch(`${API_BASE}/api/friends/accept`, {
         method: 'POST',
         headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
         body: JSON.stringify({ requestId })
       });
       document.body.style.cursor = 'default';
       await fetchFriends();
       if (personObj) openChat(personObj);
    }

    async function declineFriendRequest(requestId) {
       document.body.style.cursor = 'wait';
       await fetch(`${API_BASE}/api/friends/decline`, {
         method: 'POST',
         headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
         body: JSON.stringify({ requestId })
       });
       document.body.style.cursor = 'default';
       fetchFriends();
    }

    async function unfriend(targetId) {
      showConfirmModal({
        title: 'Remove Friend?',
        message: 'Are you sure you want to remove this friend? This will end your friendship and delete your chat history.',
        icon: '👤',
        confirmText: 'Remove Friend',
        onConfirm: async () => {
          document.body.style.cursor = 'wait';
          try {
            await fetch(`${API_BASE}/api/friends/unfriend`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({ targetUserId: targetId })
            });
            fetchFriends();
          } finally {
            document.body.style.cursor = 'default';
          }
        }
      });
    }

    async function fetchUsers(query = '') {
      try {
        const res = await fetch(`${API_BASE}/api/users/search?q=${encodeURIComponent(query)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401 || res.status === 403) throw new Error('Unauth');
        
        const data = await res.json();
        people = data.map(u => ({ 
          id: u.id, 
          name: u.username, 
          firstName: u.firstName, 
          lastName: u.lastName, 
          isOnline: u.isOnline 
        }));
        renderInviteList();
      } catch(err) {
        if (err.message === 'Unauth') {
           localStorage.removeItem('chatToken');
           localStorage.removeItem('chatUsername');
           window.location.href = '/';
        }
      }
    }

    // Live search binding
    document.getElementById('live-search').addEventListener('input', (e) => {
      fetchUsers(e.target.value.trim()).then(() => renderInviteList());
    });

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    }

    function groupByLetter(arr) {
      const groups = {};
      arr.forEach(p => {
        const letter = p.name[0].toUpperCase();
        if (!groups[letter]) groups[letter] = [];
        groups[letter].push(p);
      });
      return groups;
    }

    function toggleSelect(name, avatarEl, rowEl) {
      if (selected.has(name)) {
        selected.delete(name);
        avatarEl.classList.remove('selected');
        rowEl.classList.remove('row-selected');
      } else {
        selected.add(name);
        avatarEl.classList.add('selected');
        rowEl.classList.add('row-selected');
      }
      updateSendBar();
    }

    async function checkProfile() {
      try {
        const res = await fetch(`${API_BASE}/api/users/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const profile = await res.json();
          if (!profile.firstName || !profile.lastName) {
            document.getElementById('profile-setup-overlay').classList.add('visible');
          }
        }
      } catch (err) { console.error('checkProfile error:', err); }
    }

    async function saveInitialProfile() {
      const firstName = document.getElementById('setup-firstname').value.trim();
      const lastName = document.getElementById('setup-lastname').value.trim();
      const hobbies = document.getElementById('setup-hobbies').value.trim();

      if (!firstName || !lastName) return showToast('Please enter your name!');

      try {
        const res = await fetch(`${API_BASE}/api/users/profile`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ firstName, lastName, hobbies })
        });
        if (res.ok) {
          document.getElementById('profile-setup-overlay').classList.remove('visible');
          showToast('Profile setup complete! 🤚');
        } else {
          showToast('Failed to save profile. Try again.');
        }
      } catch (err) {
        showToast('Error saving profile.');
      } finally {
        isUpdatingProfile = false;
      }
    }

    async function deleteAccountRequest() {
      showConfirmModal({
        title: 'Delete Account?',
        message: 'Are you absolutely sure you want to delete your account? This action is permanent and all your messages and profile data will be lost forever.',
        icon: '🗑️',
        confirmText: 'Delete Permanently',
        onConfirm: async () => {
          try {
            const res = await fetch(`${API_BASE}/api/users/profile`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.ok) {
              showToast('Account deleted. Goodbye! 👋');
              setTimeout(() => {
                localStorage.clear();
                window.location.reload();
              }, 2000);
            } else {
              showToast('Failed to delete account.');
            }
          } catch (err) {
            showToast('Error deleting account.');
          }
        }
      });
    }

    function showConfirmModal({ title, message, icon, confirmText, onConfirm }) {
      const overlay = document.getElementById('custom-modal-overlay');
      document.getElementById('modal-title').textContent = title || 'Are you sure?';
      document.getElementById('modal-message').textContent = message || '';
      document.getElementById('modal-icon').textContent = icon || '⚠️';
      const confirmBtn = document.getElementById('modal-confirm');
      const cancelBtn = document.getElementById('modal-cancel');
      confirmBtn.textContent = confirmText || 'Confirm';
      
      overlay.classList.add('visible');
      
      const cleanup = () => {
        overlay.classList.remove('visible');
        confirmBtn.onclick = null;
        cancelBtn.onclick = null;
      };
      
      confirmBtn.onclick = () => {
        cleanup();
        if (onConfirm) onConfirm();
      };
      
      cancelBtn.onclick = () => {
        cleanup();
      };
    }

    async function renderProfileTab() {
      const list = document.getElementById('people-list');
      list.innerHTML = '<div style="padding:40px; text-align:center;">Loading profile...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/users/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const profile = await res.json();

        const initials = (profile.firstName?.[0] || '') + (profile.lastName?.[0] || '') || profile.username[0].toUpperCase();

        list.innerHTML = `
          <div class="profile-container">
            <div class="profile-card">
              <div class="profile-avatar-large">${initials}</div>
              <div class="profile-username">@${profile.username}</div>

              <div class="profile-edit-group">
                <label class="setup-label">FIRST NAME</label>
                <input type="text" id="edit-firstName" class="setup-input" value="${profile.firstName || ''}" />
              </div>

              <div class="profile-edit-group">
                <label class="setup-label">LAST NAME</label>
                <input type="text" id="edit-lastName" class="setup-input" value="${profile.lastName || ''}" />
              </div>

              <div class="profile-edit-group">
                <label class="setup-label">HOBBIES</label>
                <input type="text" id="edit-hobbies" class="setup-input" value="${profile.hobbies || ''}" />
              </div>

              <button class="profile-save-btn" onclick="saveProfileUpdate()">Update Profile</button>
              <div id="profile-success-msg">Profile updated successfully! ✨</div>
            </div>

            <button onclick="localStorage.clear(); window.location.reload();" style="width:100%; padding:14px; border-radius:100px; background:var(--bg); border:1px solid var(--separator); color:var(--text-muted); font-family:'Syne',sans-serif; font-weight:700; cursor:pointer;">Logout</button>
            <button onclick="deleteAccountRequest()" style="width:100%; padding:14px; border-radius:100px; background:transparent; border:1px solid #FF3B30; color:#FF3B30; font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; margin-top:12px;">Delete Account</button>
          </div>
        `;
      } catch (err) {
        list.innerHTML = '<div style="padding:40px; text-align:center; color:red;">Failed to load profile.</div>';
      }
    }

    async function saveProfileUpdate() {
      const firstName = document.getElementById('edit-firstName').value.trim();
      const lastName = document.getElementById('edit-lastName').value.trim();
      const hobbies = document.getElementById('edit-hobbies').value.trim();

      try {
        const res = await fetch(`${API_BASE}/api/users/profile`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, hobbies })
        });
        if (res.ok) {
          await renderProfileTab(); // Re-render first to show updated values
          const successMsg = document.getElementById('profile-success-msg');
          if (successMsg) {
            successMsg.style.display = 'block';
            setTimeout(() => { if (successMsg) successMsg.style.display = 'none'; }, 3000);
          }
        }
      } catch (err) { showToast('Error updating profile.'); }
    }





    function renderEmptyTab(icon, title, sub) {
      const list = document.getElementById('people-list');
      list.innerHTML = `
        <div class="empty-tab">
          <div class="empty-tab-icon">${icon}</div>
          <div class="empty-tab-title">${title}</div>
          <p class="empty-tab-sub">${sub}</p>
        </div>
      `;
      document.getElementById('alpha-bar').innerHTML = '';
    }



    function sendInvites() {
      const names = [...selected];
      showToast(`HiFive sent to: ${names.join(', ')} 🤚`);
      selected.clear();
      renderInviteList();
      updateSendBar();
    }

    // ── Chat Logic ──────────────────────────────────
    let socket = null;
    let activeConversation = null;
    let activePartner = null;
    let icebreakerUnlocked = false;

    function initSocket() {
      if (socket) return;
      socket = io(API_BASE, { auth: { token } });
      
      socket.on('connect', () => console.log('Connected to chat server'));
      
      socket.on('new_message', (msg) => {
        if (activeConversation === msg.conversationId) {
          const isMine = msg.sender ? msg.sender.username === myUsername : false;
          const senderName = msg.sender ? msg.sender.username : 'System';
          appendMessage(msg.content, isMine, senderName);
          scrollToBottom();
        } else {
          showToast(`New message from ${msg.sender ? msg.sender.username : 'System'}! 💬`);
          if (friendsData && friendsData.friends && msg.sender) {
            const friend = friendsData.friends.find(f => f.id === msg.sender.id);
            if (friend) {
              friend.unreadCount = (friend.unreadCount || 0) + 1;
              if (currentTab === 'friends') renderInviteList();
            }
          }
        }
      });

      socket.on('new_friend_request', (data) => {
        // Refresh friends data so new request appears in Requests tab
        fetchFriends().then(() => {
          // If currently on Requests tab, re-render it
          if (currentTab === 'requests') renderInviteList();
          
          // Show a subtle badge on the Requests tab if not already viewing it
          const requestsTab = document.getElementById('tab-requests');
          if (currentTab !== 'requests') {
            if (!requestsTab.querySelector('.req-badge')) {
              const badge = document.createElement('span');
              badge.className = 'req-badge';
              badge.style.cssText = 'background:#FF3B30;color:#fff;border-radius:50%;font-size:0.65rem;padding:1px 5px;margin-left:4px;font-weight:700;';
              badge.textContent = '!';
              requestsTab.appendChild(badge);
            }
          }
        });
      });

      // When our sent friend request is accepted, immediately open the Gemini icebreaker chat
      socket.on('friend_request_accepted', (data) => {
        const { acceptor } = data;
        fetchFriends().then(() => {
          openChat({ id: acceptor.id, name: acceptor.username });
        });
      });

      // Icebreaker: first user submitted, waiting for second
      socket.on('icebreaker_waiting', () => {
        // Already handled in submitIcebreaker UI update — no extra action needed
      });

      // Icebreaker: both users answered — reveal the full summary
      socket.on('icebreaker_complete', (data) => {
        const { conversationId, question, answers } = data;
        
        // Only update the UI if we are currently looking at this conversation
        if (activeConversation === conversationId) {
          const pane = document.getElementById('chat-messages');
          const safe = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');

          let answersHtml = answers.map(a => `
            <div style="margin-top:12px; padding:10px 14px; border-radius:10px; background:rgba(255,255,255,0.06);">
              <div style="font-weight:700; color:var(--blue); margin-bottom:4px;">${safe(a.username)}</div>
              <div>${safe(a.answer)}</div>
            </div>
          `).join('');

          pane.innerHTML = `
            <div style="padding:20px; margin:12px; border-radius:16px; background:rgba(91,145,255,0.1); border:1px solid var(--blue-mid);">
              <div style="font-size:1.3rem; text-align:center; margin-bottom:4px;">✨ Icebreaker Complete!</div>
              <div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:16px;">Both answers revealed</div>
              <div style="font-weight:600; margin-bottom:8px;">${safe(question)}</div>
              ${answersHtml}
            </div>
            <div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:12px;">🎉 You're now connected! Start chatting below.</div>
          `;

          icebreakerUnlocked = true;
          document.getElementById('chat-input').disabled = false;
          document.getElementById('chat-send').disabled = false;
          scrollToBottom();
        }
      });

      // Handle user deletion in real-time
      socket.on('user_deleted', ({ userId }) => {
        // Remove from search results
        people = people.filter(p => p.id !== userId);
        // Remove from friend data
        if (friendsData) {
          if (friendsData.friends) friendsData.friends = friendsData.friends.filter(f => f.id !== userId);
          if (friendsData.pendingSent) friendsData.pendingSent = friendsData.pendingSent.filter(f => f.user?.id !== userId);
          if (friendsData.pendingReceived) friendsData.pendingReceived = friendsData.pendingReceived.filter(f => f.user?.id !== userId);
        }
        // Re-render if necessary
        if (['friends', 'search', 'requests'].includes(currentTab)) {
          renderInviteList();
        }
        // If chatting with deleted user, close it
        if (activePartner && activePartner.id === userId) {
          closeChat();
          showToast('User account was deleted.');
        }
      });

      // Friend removed — update Friends tab on both sides in real-time
      socket.on('friend_removed', (data) => {
        const { removedUserId } = data;
        fetchFriends().then(() => renderInviteList());
        
        // If the chat with this person is open, shut it down
        if (activePartner && String(activePartner.id) === String(removedUserId)) {
          console.log('Active partner removed - closing chat pane');
          document.getElementById('chat-pane').classList.remove('open');
          activePartner = null;
          activeConversation = null;
          showToast('This user has unfriended you. The chat is now closed.');
        }
      });
    }

    async function openChat(partnerObj) {
      activePartner = partnerObj;
      document.getElementById('chat-title').textContent = partnerObj.name;
      document.getElementById('chat-pane').classList.add('open');
      document.getElementById('chat-messages').innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:40px;">Loading chat...</div>';
      
      // Clear unread count locally
      if (friendsData && friendsData.friends) {
        const friend = friendsData.friends.find(f => f.id === partnerObj.id);
        if (friend && friend.unreadCount > 0) {
          friend.unreadCount = 0;
          if (currentTab === 'friends') renderInviteList();
        }
      }

      initSocket();
      
      try {
        const res = await fetch(`${API_BASE}/api/chat/sessions`, {
           method: 'POST',
           headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
           body: JSON.stringify({ targetUserId: partnerObj.id })
        });
        const conv = await res.json();
        activeConversation = conv.id;
        
        const histRes = await fetch(`${API_BASE}/api/chat/${conv.id}/history`, {
           headers: { 'Authorization': `Bearer ${token}` }
        });
        const history = await histRes.json();
        
        socket.emit('join_room', { conversationId: conv.id });
        renderHistory(history);
      } catch (err) {
        console.error('Error opening chat:', err);
      }
    }

    function closeChat() {
      document.getElementById('chat-pane').classList.remove('open');
      activeConversation = null;
      activePartner = null;
    }

    function scrollToBottom() {
      const pane = document.getElementById('chat-messages');
      pane.scrollTop = pane.scrollHeight;
    }

    function renderHistory(messages) {
      const pane = document.getElementById('chat-messages');
      pane.innerHTML = '';
      
      if (messages.length === 0) {
        // Enforce Icebreaker
        icebreakerUnlocked = false;
        document.getElementById('chat-input').disabled = true;
        document.getElementById('chat-send').disabled = true;
        
        // Generate Icebreaker
        pane.innerHTML = '<div style="text-align:center; margin-top: 40px; color: var(--blue); font-weight: 600;">✨ Generating AI Icebreaker...</div>';
        
        if (!activeConversation) {
          console.warn('Cannot fetch icebreaker: activeConversation is null');
          return;
        }
        
        fetch(`${API_BASE}/api/ai/icebreaker?conversationId=${activeConversation}`, { headers: { 'Authorization': `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            const q = data.question || "If you could have any superpower, what would it be?";
            pane.innerHTML = `
              <div class="icebreaker-card">
                <div class="icebreaker-icon">🧊</div>
                <div class="icebreaker-q">${q}</div>
                <input type="text" id="ib-answer" class="icebreaker-ib" placeholder="Your answer..." />
                <button class="icebreaker-btn" onclick="submitIcebreaker()">Break the Ice 🤚</button>
              </div>
            `;
            window._currentIcebreakerQ = q; // temp hold
          })
          .catch(() => {
             const q = "If you could have any superpower, what would it be?";
             pane.innerHTML = `
               <div class="icebreaker-card">
                 <div class="icebreaker-icon">🧊</div>
                 <div class="icebreaker-q">${q}</div>
                 <input type="text" id="ib-answer" class="icebreaker-ib" placeholder="Your answer..." />
                 <button class="icebreaker-btn" onclick="submitIcebreaker()">Break the Ice 🤚</button>
               </div>
             `;
             window._currentIcebreakerQ = q;
          });
      } else {
        document.getElementById('chat-messages').innerHTML = '';
        icebreakerUnlocked = true;
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-send').disabled = false;
        messages.forEach(m => {
          const isMine = m.sender ? m.sender.username === myUsername : false;
          const senderName = m.sender ? m.sender.username : 'System';
          appendMessage(m.content, isMine, senderName);
        });
        scrollToBottom();
      }
    }

    function submitIcebreaker() {
      const ans = document.getElementById('ib-answer').value.trim();
      if (!ans) return;

      // Emit the answer to the backend — it will wait for BOTH users to answer
      socket.emit('icebreaker_answer', {
        conversationId: activeConversation,
        question: window._currentIcebreakerQ,
        answer: ans
      });

      // Show a waiting state on this side
      const pane = document.getElementById('chat-messages');
      pane.innerHTML = `
        <div style="text-align:center; margin-top: 60px; color: var(--text-muted); font-size:0.95rem;">
          <div style="font-size:2rem; margin-bottom:12px;">⏳</div>
          <div style="font-weight:600;">Answer submitted!</div>
          <div style="margin-top:8px;">Waiting for the other person to answer...</div>
        </div>
      `;
    }

    function appendMessage(text, isMine, senderName) {
      const pane = document.getElementById('chat-messages');
      const wrap = document.createElement('div');
      
      if (senderName === 'System') {
        wrap.className = 'msg-wrap system';
        wrap.style.cssText = 'width:calc(100% - 40px); margin:12px 20px; text-align:center;';
        wrap.innerHTML = `
          <div style="padding:16px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px dashed var(--blue-mid); color:var(--text-muted); font-size:0.85rem; line-height:1.5;">
            ${text.replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}
          </div>
        `;
      } else {
        wrap.className = `msg-wrap ${isMine ? 'mine' : 'theirs'}`;
        // Escape HTML safely
        const safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        wrap.innerHTML = `
          <div class="msg-sender">${isMine ? 'You' : senderName}</div>
          <div class="msg-bubble">${safeText.replace(/\n/g, '<br/>')}</div>
        `;
      }
      pane.appendChild(wrap);
    }
    
    document.getElementById('chat-send').addEventListener('click', () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !activeConversation || !icebreakerUnlocked) return;
      
      socket.emit('send_message', { conversationId: activeConversation, content: text });
      input.value = '';
    });
    
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('chat-send').click();
    });

    // ── Init ──────────────────────────────────
    checkProfile();
    fetchUsers().then(() => fetchFriends()).then(() => {
      switchTab('friends');
    });
    // Connect socket immediately so we receive friend request notifications
    initSocket();
  </script>
  <!-- Custom Confirmation Modal -->
  <div id="custom-modal-overlay" class="modal-overlay">
    <div class="modal-card">
      <div id="modal-icon" class="modal-icon">⚠️</div>
      <h3 id="modal-title" class="modal-title">Are you sure?</h3>
      <p id="modal-message" class="modal-message">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn cancel">Cancel</button>
        <button id="modal-confirm" class="modal-btn confirm">Confirm</button>
      </div>
    </div>
  </div>

</body>
</html>
